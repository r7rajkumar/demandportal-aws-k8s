---
# ClusterIssuer - Let's Encrypt production
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: YOUR_EMAIL@example.com    # REPLACE with your email
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
---
# ClusterIssuer - Let's Encrypt staging (use for testing first)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: YOUR_EMAIL@example.com    # REPLACE with your email
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: nginx
---
# Ingress resource
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudrequest-ingress
  namespace: demandportal
  annotations:
    # Use NGINX ingress controller
    kubernetes.io/ingress.class: nginx
    # TLS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "20"
    # cert-manager - use staging first, then switch to prod
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - YOUR_DOMAIN.com           # REPLACE with your domain
    secretName: cloudrequest-tls
  rules:
  - host: YOUR_DOMAIN.com       # REPLACE with your domain
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: cloudrequest-backend-svc
            port:
              number: 8000
      - path: /health
        pathType: Exact
        backend:
          service:
            name: cloudrequest-backend-svc
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cloudrequest-frontend-svc
            port:
              number: 80
---
# NOTE: If you don't have a domain, use NodePort access instead:
# kubectl get svc -n ingress-nginx
# Access via: http://<worker-public-ip>:30080
