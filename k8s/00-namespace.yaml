apiVersion: v1
kind: Namespace
metadata:
  name: demandportal
  labels:
    app: cloudrequest
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cloudrequest-quota
  namespace: demandportal
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "20"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: cloudrequest-limits
  namespace: demandportal
spec:
  limits:
  - type: Container
    default:
      cpu: "500m"
      memory: "256Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
